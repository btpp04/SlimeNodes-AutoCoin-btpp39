name: Earn SlimeNodes Coins

on:
  workflow_dispatch:
  schedule:
    - cron: "30 0 * * *"
    - cron: "30 12 * * *"

jobs:
  earn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup sing-box proxy
        run: |
          curl -sL https://github.com/SagerNet/sing-box/releases/download/v1.10.0/sing-box-1.10.0-linux-amd64.tar.gz | tar xz
          mv sing-box-1.10.0-linux-amd64/sing-box /usr/local/bin/
          python3 link_to_sb.py "$VLINK" > /tmp/sing-box.json
          sing-box run -c /tmp/sing-box.json &
          sleep 3
          echo "Proxy IP: $(curl -s --proxy socks5h://127.0.0.1:1080 https://ifconfig.me)"
        env:
          VLINK: "${{ secrets.VLINK }}"

      - name: Run auto-coin
        run: |
          python3 makecoins.py
        env:
          SOCKS_PROXY: "socks5h://127.0.0.1:1080"
          SLIME_ACCOUNTS: "${{ secrets.SLIME_ACCOUNTS }}"
          TG_BOT_TOKEN: "${{ secrets.TG_BOT_TOKEN }}"
          TG_CHAT_ID: "${{ secrets.TG_CHAT_ID }}"
          SERVER_ID: "${{ secrets.SERVER_ID }}"
