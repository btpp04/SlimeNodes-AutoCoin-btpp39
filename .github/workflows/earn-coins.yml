name: Earn SlimeNodes Coins
on:
  workflow_dispatch:
  schedule:
    - cron: "30 0 * * *"   # 00:30 UTC daily
    - cron: "30 12 * * *"  # 12:30 UTC daily

jobs:
  earn:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup sing-box proxy
        run: |
          curl -fsSL https://github.com/SagerNet/sing-box/releases/download/v1.11.0/sing-box-1.11.0-linux-amd64.tar.gz | tar xz
          sudo mv sing-box-1.11.0-linux-amd64/sing-box /usr/local/bin/

          # Generate sing-box config from proxy link
          python3 link_to_sb.py "$VLINK" > /tmp/sing-box.json
          echo "::notice::sing-box config generated"
          cat /tmp/sing-box.json

          nohup sing-box run -c /tmp/sing-box.json &>/tmp/sing-box.log &
          sleep 3

          # Test proxy connectivity
          echo "Testing proxy..."
          curl -s --proxy socks5h://127.0.0.1:1080 https://httpbin.org/ip || echo "Proxy test failed"
        env:
          VLINK: "${{ secrets.VLINK }}"

      - name: Run auto-coin
        run: |
          export SOCKS_PROXY="socks5h://127.0.0.1:1080"
          python3 makecoins.py
        env:
          SLIME_ACCOUNTS: "${{ secrets.SLIME_ACCOUNTS }}"
          TG_BOT_TOKEN: "${{ secrets.TG_BOT_TOKEN }}"
          TG_CHAT_ID: "${{ secrets.TG_CHAT_ID }}"
          MAX_ADS: "20"
