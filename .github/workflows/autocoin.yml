name: SlimeNodes AutoCoin

on:
  schedule:
    - cron: '30 0 * * *'
    - cron: '30 12 * * *'
  workflow_dispatch:

jobs:
  coin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup sing-box proxy
        run: |
          curl -fsSL https://github.com/SagerNet/sing-box/releases/download/v1.11.0/sing-box-1.11.0-linux-amd64.tar.gz | tar xz
          sudo mv sing-box-1.11.0-linux-amd64/sing-box /usr/local/bin/
          sudo chmod +x /usr/local/bin/sing-box
          python3 link_to_sb.py "$VLINK" > /tmp/sb.json 2>/tmp/sb_err.txt || { echo "link_to_sb.py failed:"; cat /tmp/sb_err.txt; exit 1; }
          cat /tmp/sb.json | head -5
          nohup sing-box run -c /tmp/sb.json > /tmp/singbox.log 2>&1 &
          sleep 5
          if curl -s --socks5-hostname 127.0.0.1:1080 --connect-timeout 10 https://httpbin.org/ip; then
            echo "Proxy OK"
          else
            echo "Proxy check failed, but continuing..."
            cat /tmp/singbox.log
          fi
        env:
          VLINK: ${{ secrets.VLINK }}

      - name: Install SeleniumBase
        run: |
          sudo apt-get update && sudo apt-get install -y xvfb
          pip install seleniumbase

      - name: Run AutoCoin
        run: python3 makecoins.py
        env:
          SLIME_ACCOUNTS: ${{ secrets.SLIME_ACCOUNTS }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          SOCKS_PROXY: socks5h://127.0.0.1:1080
          SERVER_ID: ${{ secrets.SERVER_ID }}
