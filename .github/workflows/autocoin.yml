name: SlimeNodes AutoCoin

on:
  schedule:
    - cron: '30 0 * * *'
    - cron: '30 12 * * *'
  workflow_dispatch:

jobs:
  coin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup sing-box proxy
        run: |
          curl -fsSL https://github.com/SagerNet/sing-box/releases/download/v1.11.0/sing-box-1.11.0-linux-amd64.tar.gz | tar xz
          mv sing-box-1.11.0-linux-amd64/sing-box /usr/local/bin/
          chmod +x /usr/local/bin/sing-box
          echo "$VLINK" | python3 link_to_sb.py > /tmp/sb.json
          sing-box run -c /tmp/sb.json &
          sleep 3
          echo "SOCKS_PROXY=socks5h://127.0.0.1:1080" >> $GITHUB_ENV
        env:
          VLINK: ${{ secrets.VLINK }}

      - name: Run AutoCoin
        run: python3 makecoins.py
        env:
          SLIME_ACCOUNTS: ${{ secrets.SLIME_ACCOUNTS }}
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          SOCKS_PROXY: socks5h://127.0.0.1:1080
